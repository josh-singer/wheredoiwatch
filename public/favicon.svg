<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Antennas -->
  <line x1="12" y1="7" x2="8" y2="1" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20" y1="7" x2="24" y2="1" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>
  <!-- TV body -->
  <rect x="2" y="7" width="28" height="20" rx="3" fill="#2b2b3b"/>
  <!-- Screen area (dark bezel inset) -->
  <rect x="5" y="10" width="18" height="13" rx="2" fill="#111"/>
  <!-- Screen glow -->
  <rect x="6" y="11" width="16" height="11" rx="1" fill="#4a8fd4"/>
  <!-- Screen shine highlight -->
  <rect x="7" y="12" width="6" height="3" rx="1" fill="#a0c8f0" opacity="0.5"/>
  <!-- Right-side knobs -->
  <circle cx="26" cy="14" r="2.2" fill="#1a1a2a"/>
  <circle cx="26" cy="14" r="1" fill="#444"/>
  <circle cx="26" cy="21" r="2.2" fill="#1a1a2a"/>
  <circle cx="26" cy="21" r="1" fill="#444"/>
  <!-- Legs -->
  <rect x="8" y="26" width="4" height="4" rx="1" fill="#1a1a2a"/>
  <rect x="20" y="26" width="4" height="4" rx="1" fill="#1a1a2a"/>
</svg>
